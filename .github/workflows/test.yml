name: 自动运行Pytest测试

on:
  push:              # 当你执行 git push 时触发
    branches: [ main ]
  pull_request:      # 当你发起 Pull Request 时触发
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  test:
    runs-on: ubuntu-latest  # 在 GitHub 提供的 Ubuntu 虚拟机上运行
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests flask
      
      - name: 启动 Flask 服务（后台运行）
        run: |
          python api_server.py &
          sleep 3  # 等待服务启动
      
      - name: 运行 Pytest 测试
        run: |
          pytest test_login.py -v --tb=short